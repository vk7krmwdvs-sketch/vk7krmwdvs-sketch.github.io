<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0b1020">
<title>Space Rover Controller</title>
<style>
:root { color-scheme: dark; --bg:#0b1020; --panel:#151d34; --text:#f5f7ff; --muted:#aab3cc; --accent:#5d8cff; --danger:#ff4d5d; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { margin:0; min-height:100vh; background:radial-gradient(circle at top,#172343,var(--bg) 45%); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
main { width:min(720px,100%); margin:auto; padding:calc(env(safe-area-inset-top) + 18px) 18px calc(env(safe-area-inset-bottom) + 24px); }
header { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
h1 { font-size:24px; margin:0; flex:1; }
.status { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:14px; margin-bottom:16px; }
.dot { width:11px; height:11px; border-radius:50%; background:#7a849f; box-shadow:0 0 0 4px #7a849f22; }
.dot.connected { background:#40d17a; box-shadow:0 0 0 4px #40d17a22; }
button { border:0; color:white; font-weight:700; border-radius:14px; padding:13px 16px; background:var(--accent); font-size:16px; }
button.secondary { background:var(--panel); border:1px solid #ffffff18; }
button.danger { width:100%; background:var(--danger); font-size:20px; padding:17px; margin:18px 0; }
button:disabled { opacity:.45; }
.card { background:#11192dcb; backdrop-filter:blur(18px); border:1px solid #ffffff14; border-radius:22px; padding:18px; box-shadow:0 20px 60px #0005; }
.joy-wrap { display:grid; place-items:center; padding:10px 0; touch-action:none; }
#joystick { position:relative; width:min(76vw,380px); aspect-ratio:1; border-radius:50%; background:radial-gradient(circle at 40% 35%,#27375f,#121a30 65%); border:2px solid #ffffff1c; box-shadow:inset 0 0 30px #0008,0 20px 50px #0005; }
#knob { position:absolute; width:36%; aspect-ratio:1; left:32%; top:32%; border-radius:50%; background:linear-gradient(145deg,#82a5ff,#3c6ef0); box-shadow:0 14px 30px #0008,inset 0 1px 0 #fff8; transform:translate(0,0); }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.grid button { background:var(--panel); border:1px solid #ffffff18; font-size:14px; }
.notice { margin-top:16px; color:var(--muted); font-size:13px; line-height:1.45; }
code { color:#c9d5ff; }
</style>
</head>
<body>
<main>
<header>
  <h1>Space Rover</h1>
  <button id="connect">Connect</button>
</header>
<div class="status"><span id="dot" class="dot"></span><span id="status">Not connected</span></div>

<section class="card">
  <div class="joy-wrap">
    <div id="joystick" aria-label="Rover joystick">
      <div id="knob"></div>
    </div>
  </div>

  <button id="stop" class="danger" disabled>■ STOP</button>

  <div class="grid" id="sounds"></div>
</section>

<p class="notice">
Use this page in a Web Bluetooth-capable browser. On iPhone, Safari does not expose Web Bluetooth; open the hosted page in Bluefy or another Web BLE browser. The rover should be switched on and disconnected from other devices.
</p>
</main>

<script>
'use strict';

const SERVICE_UUID = 'd9d9e9e0-aa4e-4797-8151-cb41cedaf2ad';
const WRITE_UUID   = 'd9d9e9e1-aa4e-4797-8151-cb41cedaf2ad';
const DRIVE = ["140202FF659D", "140202FA3538", "140202F6F4B4", "140202F2B430", "140202ED57EE", "140202EA2709", "140202E6E685", "140202E3B620", "140202DF41FF", "140202DA115A", "140202D6D0D6", "140202D29052", "140202CE43EF", "140202CA036B", "140202C5F284", "140202C28263", "140202BE3D78", "140202BA7DFC", "140202B6BC70", "140202B2FCF4", "140202AB7FEC", "140202AA6FCD", "140202A6AE41", "140202A2EEC5", "140202A1DEA6", "1402029E191A", "1402029969FD", "140202969812", "14020292D896", "1402028D3B48", "1402028A4BAF", "140202897BCC", "1402027DD457", "1402027994D3", "14020276653C", "1402027225B8", "1402026EF605", "1402026DC666", "1402026896C3", "1402026327A8", "1402026107EA", "1402025CE014", "14020259B0B1", "14020255713D", "140202502198", "1402024B82C2", "14020249A280", "14020245630C", "140202412388", "1402023BFC55", "14020239DC17", "140202337D5D", "140202304D3E", "1402022BEE64", "14020229CE26", "140202214F2E", "140202205F0F", "1402021BD837", "14020218E854", "1402021429D8", "1402020F8A82", "1402020CBAE1", "140202070B8A"];
const TURN = ["140201FC00AD", "140201EA725A", "140201E49394", "140201DF14AC", "140201D9746A", "140201D1F562", "140201CC36FE", "140201C697B4", "140201C0F772", "140201B918CC", "140201B4C961", "140201AE7A1A", "140201A7EB33", "140201A2BB96", "1402019C6C0B", "14020196CD41", "14020190AD87", "1402018A1EFC", "14020184FF32", "1402017EB167", "14020178D1A1", "1402017270EB", "1402016C8314", "14020166225E", "140201604298", "1402015AD581", "14020154344F", "1402014F9715", "14020149F7D3", "1402014246B8", "1402013CD9E1", "140201002E3E"];
const SOUNDS = {"Beep": "1E0115A364", "Whistle": "1E0114B345", "Excited": "1E0112D383", "Cheery": "1E0111E3E0", "Sad": "1E0110F3C1", "Surprise": "1E010C207C"};

let device = null;
let characteristic = null;
let lastCommand = 0;
let pendingTimer = null;

const connectBtn = document.querySelector('#connect');
const stopBtn = document.querySelector('#stop');
const statusEl = document.querySelector('#status');
const dotEl = document.querySelector('#dot');
const joystick = document.querySelector('#joystick');
const knob = document.querySelector('#knob');
const soundsEl = document.querySelector('#sounds');

for (const [name, hex] of Object.entries(SOUNDS)) {
  const b = document.createElement('button');
  b.textContent = name;
  b.className = 'secondary';
  b.disabled = true;
  b.onclick = () => writeHex(hex);
  soundsEl.appendChild(b);
}

function setStatus(text, connected=false) {
  statusEl.textContent = text;
  dotEl.classList.toggle('connected', connected);
  stopBtn.disabled = !connected;
  soundsEl.querySelectorAll('button').forEach(b => b.disabled = !connected);
  connectBtn.textContent = connected ? 'Disconnect' : 'Connect';
}

function hexToBytes(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.slice(i*2, i*2+2), 16);
  return bytes;
}

async function writeHex(hex) {
  if (!characteristic) return;
  const data = hexToBytes(hex);
  if (characteristic.writeValueWithoutResponse) {
    await characteristic.writeValueWithoutResponse(data);
  } else {
    await characteristic.writeValue(data);
  }
}

async function stopRover() {
  clearTimeout(pendingTimer);
  await writePair(15, 31, true);
}

async function writePair(turnIndex, driveIndex, force=false) {
  const now = performance.now();
  if (!force && now - lastCommand < 120) return;
  lastCommand = now;
  try {
    await writeHex(TURN[turnIndex]);
    pendingTimer = setTimeout(() => writeHex(DRIVE[driveIndex]).catch(showError), 100);
  } catch (e) { showError(e); }
}

function showError(e) {
  console.error(e);
  setStatus(e?.message || 'Bluetooth error', false);
}

async function connect() {
  if (!navigator.bluetooth) {
    setStatus('This browser does not support Web Bluetooth');
    return;
  }
  try {
    setStatus('Choose the ControlHub…');
    device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }],
      optionalServices: [SERVICE_UUID]
    });
    device.addEventListener('gattserverdisconnected', () => {
      characteristic = null;
      setStatus('Disconnected');
    });
    setStatus('Connecting…');
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(WRITE_UUID);
    setStatus('Connected', true);
    await stopRover();
  } catch (e) {
    if (e.name === 'NotFoundError') setStatus('No device selected');
    else showError(e);
  }
}

connectBtn.addEventListener('click', async () => {
  if (device?.gatt?.connected) {
    device.gatt.disconnect();
  } else {
    await connect();
  }
});

stopBtn.addEventListener('click', stopRover);

function positionFromPointer(event) {
  const r = joystick.getBoundingClientRect();
  const cx = r.left + r.width/2;
  const cy = r.top + r.height/2;
  let dx = event.clientX - cx;
  let dy = event.clientY - cy;
  const travel = r.width * 0.32;
  const length = Math.hypot(dx, dy);
  if (length > travel) {
    dx *= travel/length;
    dy *= travel/length;
  }
  knob.style.transform = `translate(${dx}px,${dy}px)`;

  const x = dx / travel;
  const y = dy / travel;
  const distance = Math.min(1, Math.hypot(x,y));
  if (distance < 0.10) return stopRover();

  const angle = Math.atan2(x, -y);
  const limit = 0.75 * Math.PI;
  let turnIndex, driveIndex;

  if (Math.abs(angle) < limit) {
    turnIndex = Math.floor(((33 - 2) * (angle + limit)) / (2 * limit) + 2);
    driveIndex = Math.floor((0 - 31) * distance + 31);
  } else {
    turnIndex = 15;
    driveIndex = Math.floor((62 - 31) * distance + 31);
  }

  turnIndex = Math.max(0, Math.min(TURN.length - 1, turnIndex));
  driveIndex = Math.max(0, Math.min(DRIVE.length - 1, driveIndex));
  writePair(turnIndex, driveIndex);
}

let dragging = false;
joystick.addEventListener('pointerdown', e => {
  dragging = true;
  joystick.setPointerCapture(e.pointerId);
  positionFromPointer(e);
});
joystick.addEventListener('pointermove', e => {
  if (dragging) positionFromPointer(e);
});
async function releasePointer() {
  if (!dragging) return;
  dragging = false;
  knob.style.transform = 'translate(0,0)';
  await stopRover();
}
joystick.addEventListener('pointerup', releasePointer);
joystick.addEventListener('pointercancel', releasePointer);
joystick.addEventListener('lostpointercapture', releasePointer);

document.addEventListener('visibilitychange', () => {
  if (document.hidden) stopRover();
});
window.addEventListener('pagehide', () => stopRover());

setStatus(navigator.bluetooth ? 'Ready to connect' : 'Web Bluetooth unavailable in this browser');
</script>
</body>
</html>
