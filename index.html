<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0b1020">
<title>Space Rover Controller v4</title>
<style>
:root { color-scheme: dark; --bg:#0b1020; --panel:#151d34; --text:#f5f7ff; --muted:#aab3cc; --accent:#5d8cff; --danger:#ff4d5d; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { margin:0; min-height:100vh; background:radial-gradient(circle at top,#172343,var(--bg) 45%); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
main { width:min(760px,100%); margin:auto; padding:calc(env(safe-area-inset-top) + 18px) 18px calc(env(safe-area-inset-bottom) + 24px); }
header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
h1 { font-size:24px; margin:0; flex:1; }
.status { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:14px; margin-bottom:16px; }
.dot { width:11px; height:11px; border-radius:50%; background:#7a849f; box-shadow:0 0 0 4px #7a849f22; }
.dot.connected { background:#40d17a; box-shadow:0 0 0 4px #40d17a22; }
button { border:0; color:white; font-weight:700; border-radius:14px; padding:13px 16px; background:var(--accent); font-size:16px; }
button.secondary { background:var(--panel); border:1px solid #ffffff18; }
button.danger { width:100%; background:var(--danger); font-size:20px; padding:17px; margin:18px 0; }
button:disabled { opacity:.45; }
.card { background:#11192dcb; backdrop-filter:blur(18px); border:1px solid #ffffff14; border-radius:22px; padding:18px; box-shadow:0 20px 60px #0005; margin-bottom:14px; }
.joy-wrap { display:grid; place-items:center; padding:10px 0; touch-action:none; }
#joystick { position:relative; width:min(76vw,360px); aspect-ratio:1; border-radius:50%; background:radial-gradient(circle at 40% 35%,#27375f,#121a30 65%); border:2px solid #ffffff1c; box-shadow:inset 0 0 30px #0008,0 20px 50px #0005; }
#knob { position:absolute; width:36%; aspect-ratio:1; left:32%; top:32%; border-radius:50%; background:linear-gradient(145deg,#82a5ff,#3c6ef0); box-shadow:0 14px 30px #0008,inset 0 1px 0 #fff8; transform:translate(0,0); }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.grid button { background:var(--panel); border:1px solid #ffffff18; font-size:14px; }
.row { display:flex; gap:12px; align-items:center; margin:12px 0; }
.row label { min-width:92px; color:var(--muted); font-size:14px; }
input[type=range] { width:100%; }
.toggle { display:flex; align-items:center; gap:8px; font-size:14px; color:var(--muted); }
.notice { margin-top:12px; color:var(--muted); font-size:13px; line-height:1.45; }
code { color:#c9d5ff; }
</style>
</head>
<body>
<main>
<header>
  <h1>Space Rover v4</h1>
  <button id="connect">Connect</button>
</header>
<div class="status"><span id="dot" class="dot"></span><span id="status">Not connected</span></div>

<section class="card">
  <div class="joy-wrap">
    <div id="joystick" aria-label="Differential drive joystick"><div id="knob"></div></div>
  </div>
  <div class="row">
    <label class="toggle"><input id="invertLeft" type="checkbox"> Invert left</label>
    <label class="toggle"><input id="invertRight" type="checkbox" checked> Invert right</label>
  </div>
  <button id="stop" class="danger" disabled>■ STOP</button>
</section>

<section class="card">
  <div class="row"><label>Swing arm</label><input id="arm" type="range" min="0" max="255" value="128"></div>
  <div class="grid" id="sounds"></div>
</section>

<p class="notice">
This version uses a fixed-rate control loop with no command backlog. Releasing the joystick or pressing STOP sets both motors to neutral immediately.
Test with the wheels raised first.
</p>
</main>

<script>
'use strict';

const SERVICE_UUID = 'f8e49400-16f2-457e-8426-0fbce4eac6dc';
const WRITE_UUID   = 'f8e49401-16f2-457e-8426-0fbce4eac6dc';

const SOUNDS = {
  Beep:'1E0115A364', Whistle:'1E0114B345', Excited:'1E0112D383',
  Cheery:'1E0111E3E0', Sad:'1E0110F3C1', Surprise:'1E010C207C'
};

let device = null;
let characteristic = null;
let controlTimer = null;
let writing = false;

let desiredLeft = 0;
let desiredRight = 0;
let desiredArm = 128;
let lastSentArm = null;
let forceArmSend = true;

const connectBtn = document.querySelector('#connect');
const stopBtn = document.querySelector('#stop');
const statusEl = document.querySelector('#status');
const dotEl = document.querySelector('#dot');
const joystick = document.querySelector('#joystick');
const knob = document.querySelector('#knob');
const arm = document.querySelector('#arm');
const soundsEl = document.querySelector('#sounds');
const invertLeft = document.querySelector('#invertLeft');
const invertRight = document.querySelector('#invertRight');

for (const [name, hex] of Object.entries(SOUNDS)) {
  const b = document.createElement('button');
  b.textContent = name;
  b.className = 'secondary';
  b.disabled = true;
  b.onclick = () => writeHex(hex).catch(showError);
  soundsEl.appendChild(b);
}

function setStatus(text, connected=false) {
  statusEl.textContent = text;
  dotEl.classList.toggle('connected', connected);
  stopBtn.disabled = !connected;
  soundsEl.querySelectorAll('button').forEach(b => b.disabled = !connected);
  connectBtn.textContent = connected ? 'Disconnect' : 'Connect';
}

function hexToBytes(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.slice(i*2, i*2+2), 16);
  return bytes;
}

function crc16Xmodem(bytes) {
  let crc = 0x0000;
  for (const b of bytes) {
    crc ^= (b << 8);
    for (let i = 0; i < 8; i++) {
      crc = (crc & 0x8000) ? (((crc << 1) ^ 0x1021) & 0xFFFF) : ((crc << 1) & 0xFFFF);
    }
  }
  return crc;
}

function makeOutputCommand(channel, value) {
  const body = new Uint8Array([0x14, 0x02, channel & 0xFF, value & 0xFF]);
  const checksum = crc16Xmodem(body) ^ 0xA239;
  return new Uint8Array([...body, (checksum >> 8) & 0xFF, checksum & 0xFF]);
}

async function writeBytes(bytes) {
  if (!characteristic) return;
  if (characteristic.writeValueWithoutResponse) {
    await characteristic.writeValueWithoutResponse(bytes);
  } else {
    await characteristic.writeValue(bytes);
  }
}

async function writeHex(hex) {
  await writeBytes(hexToBytes(hex));
}

function speedToValue(speed, invert=false) {
  let s = Math.max(-1, Math.min(1, speed));
  if (invert) s = -s;
  const neutral = 0x89;
  return s >= 0
    ? Math.round(neutral + s * (0xFF - neutral))
    : Math.round(neutral + s * (neutral - 0x07));
}

async function sendControlFrame() {
  if (!characteristic || writing) return;
  writing = true;
  try {
    const left = speedToValue(desiredLeft, invertLeft.checked);
    const right = speedToValue(desiredRight, invertRight.checked);

    await writeBytes(makeOutputCommand(0, left));
    await new Promise(r => setTimeout(r, 35));
    await writeBytes(makeOutputCommand(2, right));

    if (forceArmSend || desiredArm !== lastSentArm) {
      await new Promise(r => setTimeout(r, 35));
      await writeBytes(makeOutputCommand(1, desiredArm));
      lastSentArm = desiredArm;
      forceArmSend = false;
    }
  } catch (e) {
    showError(e);
  } finally {
    writing = false;
  }
}

function startControlLoop() {
  stopControlLoop();
  controlTimer = setInterval(sendControlFrame, 140);
}

function stopControlLoop() {
  if (controlTimer) clearInterval(controlTimer);
  controlTimer = null;
}

async function emergencyStop() {
  desiredLeft = 0;
  desiredRight = 0;
  knob.style.transform = 'translate(0,0)';

  // Wait only for the currently active write to finish; there is no backlog.
  while (writing) await new Promise(r => setTimeout(r, 10));

  try {
    writing = true;
    await writeBytes(makeOutputCommand(0, 0x89));
    await new Promise(r => setTimeout(r, 40));
    await writeBytes(makeOutputCommand(2, 0x89));
  } catch (e) {
    showError(e);
  } finally {
    writing = false;
  }
}

function showError(e) {
  console.error(e);
  setStatus(e?.message || 'Bluetooth error', false);
}

async function connect() {
  if (!navigator.bluetooth) return setStatus('This browser does not support Web Bluetooth');
  try {
    setStatus('Choose w33 Control Hub…');
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SERVICE_UUID]
    });
    device.addEventListener('gattserverdisconnected', () => {
      characteristic = null;
      stopControlLoop();
      setStatus('Disconnected');
    });
    setStatus('Connecting…');
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(WRITE_UUID);

    desiredLeft = 0;
    desiredRight = 0;
    desiredArm = Number(arm.value);
    forceArmSend = true;

    setStatus('Connected', true);
    await emergencyStop();
    startControlLoop();
  } catch (e) {
    if (e.name === 'NotFoundError') setStatus('No device selected');
    else showError(e);
  }
}

connectBtn.addEventListener('click', async () => {
  if (device?.gatt?.connected) {
    await emergencyStop();
    device.gatt.disconnect();
  } else {
    await connect();
  }
});

stopBtn.addEventListener('click', emergencyStop);

arm.addEventListener('input', () => {
  desiredArm = Number(arm.value);
  forceArmSend = true;
});

function positionFromPointer(event) {
  const r = joystick.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  let dx = event.clientX - cx, dy = event.clientY - cy;
  const travel = r.width * 0.32;
  const len = Math.hypot(dx,dy);
  if (len > travel) { dx *= travel/len; dy *= travel/len; }
  knob.style.transform = `translate(${dx}px,${dy}px)`;

  const x = dx / travel;
  const y = -dy / travel;

  // Dead zone around center.
  if (Math.hypot(x, y) < 0.10) {
    desiredLeft = 0;
    desiredRight = 0;
    return;
  }

  let left = y + x;
  let right = y - x;
  const scale = Math.max(1, Math.abs(left), Math.abs(right));
  desiredLeft = left / scale;
  desiredRight = right / scale;
}

let dragging = false;
joystick.addEventListener('pointerdown', e => {
  dragging = true;
  joystick.setPointerCapture(e.pointerId);
  positionFromPointer(e);
});
joystick.addEventListener('pointermove', e => {
  if (dragging) positionFromPointer(e);
});
function releasePointer() {
  if (!dragging) return;
  dragging = false;
  desiredLeft = 0;
  desiredRight = 0;
  knob.style.transform = 'translate(0,0)';
  emergencyStop();
}
joystick.addEventListener('pointerup', releasePointer);
joystick.addEventListener('pointercancel', releasePointer);
joystick.addEventListener('lostpointercapture', releasePointer);

document.addEventListener('visibilitychange', () => {
  if (document.hidden && characteristic) emergencyStop();
});
window.addEventListener('pagehide', () => {
  desiredLeft = 0;
  desiredRight = 0;
});

setStatus(navigator.bluetooth ? 'Ready to connect' : 'Web Bluetooth unavailable in this browser');
</script>
</body>
</html>
